<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honeybunch's Love Letters 💌</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dream: #ffe6eb;
            --cute-white: #fffafa;
            --soft-pink: #ffafcc;
            --sparkle-pink: #ff4d6d;
            --cute-text: #6d4c51;
            --cute-glow: 0 0 15px rgba(255, 77, 109, 0.4);
            --shadow-cute: 0 8px 30px rgba(255, 182, 193, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-dream);
            overflow-x: hidden;
            color: var(--cute-text);
            min-height: 100vh;
        }

        /* CINEMATIC INTRO */
        #intro {
            position: fixed;
            inset: 0;
            background: #ffe6f0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            animation: cuteFadeOut 4s ease forwards 3.5s;
        }
        #intro h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--sparkle-pink);
            font-size: 3rem;
            text-shadow: var(--cute-glow);
            animation: introHeartBeat 1.5s ease infinite alternate;
        }
        @keyframes cuteFadeOut { to { opacity: 0; visibility: hidden; } }
        @keyframes introHeartBeat { from { transform: scale(1); } to { transform: scale(1.05); } }

        /* FLOATING HEARTS */
        .heart {
            position: fixed;
            color: var(--soft-pink);
            animation: fall 6s linear infinite;
            z-index: -1;
            user-select: none;
        }
        @keyframes fall {
            0% { transform: translateY(105vh) rotate(0deg) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
        }

        /* LOCK SCREEN */
        #lock {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fffafa, #ffe6eb);
            position: fixed;
            width: 100%;
            z-index: 999;
            transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 35px;
            border-radius: 30px;
            text-align: center;
            box-shadow: var(--shadow-cute);
            width: 90%; max-width: 380px;
            border: 2px solid #fff;
            animation: cardWiggle 2s infinite ease-in-out alternate;
        }
        @keyframes cardWiggle { from { transform: rotate(-2deg); } to { transform: rotate(2deg); } }

        input {
            padding: 15px; width: 100%; margin: 15px 0; border-radius: 20px;
            border: 3px solid var(--soft-pink); text-align: center; outline: none;
            color: var(--sparkle-pink); font-weight: 500;
        }

        button {
            padding: 12px 30px; border: none; border-radius: 25px; cursor: pointer;
            background-color: var(--sparkle-pink); color: white; font-weight: bold;
            transition: 0.4s; box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
        }
        button:hover { transform: scale(1.1); box-shadow: var(--cute-glow); }

        /* MAIN CONTENT */
        main { display: none; padding: 40px 20px; text-align: center; }
        .title { font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--sparkle-pink); margin-bottom: 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px; margin: 0 auto 40px auto; max-width: 1100px;
        }

        .box {
            background: var(--cute-white); padding: 20px; border-radius: 20px;
            cursor: pointer; transition: 0.4s; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 2px solid transparent; display: flex; flex-direction: column; align-items: center;
        }
        .box:hover { transform: translateY(-10px); border-color: var(--soft-pink); box-shadow: var(--cute-glow); }
        .category-name { font-size: 0.95rem; color: var(--cute-text); margin-top: 10px; font-weight: 600; }

        /* MODAL */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1001; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: var(--cute-white); padding: 40px 30px; border-radius: 35px;
            width: 90%; max-width: 500px; text-align: center; position: relative;
            animation: cutePop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 4px solid var(--soft-pink);
        }
        @keyframes cutePop { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .letter { font-size: 1.1rem; line-height: 1.6; margin-top: 20px; text-align: left; min-height: 100px; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #aaa; }
        
        .spotify-wrap { margin: 40px auto; max-width: 500px; border: 4px solid var(--soft-pink); border-radius: 16px; background: white; box-shadow: var(--cute-glow); }
    </style>
</head>
<body>

<div id="intro">
    <h1>For My 21st Love Story 💖</h1>
</div>

<div id="lock">
    <div class="card">
        <h2 style="font-family: 'Dancing Script'; font-size: 2.5rem; color: var(--sparkle-pink);">Hello Langga 💖</h2>
        <p>Enter password</p>
        <input id="pass" type="password" placeholder="••••••••••••">
        <button onclick="openSite()">Unlock My Heart ✨</button>
    </div>
</div>

<main>
    <h1 class="title">Open When Letters 💌</h1>
    <div class="grid" id="grid"></div>
    <div class="spotify-wrap">
        <iframe id="player" style="border-radius:12px" src="http://googleusercontent.com/spotify.com/8" width="100%" height="152" frameborder="0" allowfullscreen allow="autoplay"></iframe>
    </div>
</main>

<div class="modal" id="modal">
    <div class="modal-content">
        <span class="close" onclick="closeM()">×</span>
        <h3 id="t" style="font-family: 'Dancing Script'; font-size: 2rem; color: var(--sparkle-pink);"></h3>
        <div class="letter" id="l"></div>
        <button onclick="closeM()" style="margin-top:20px">Close 🎀</button>
    </div>
</div>

let typingInterval;

function openSite() {
    if (document.getElementById('pass').value.toUpperCase() == "HONEYBUNCHSUGARPLUM") {
        document.getElementById('lock').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('lock').style.display = 'none';
            document.querySelector('main').style.display = 'block';
            let p = document.getElementById('player');
            p.src += "&autoplay=1";
            load();
        }, 1000);
    } else {
        alert("Wrong password, my cute honeybunch! ❤️");
    }
}

function load() {
    let g = document.getElementById('grid');
    data.forEach((c, idx) => {
        let d = document.createElement('div');
        d.className = 'box';
        d.innerHTML = `<span style="font-size:2rem">${c.icon}</span><span class="category-name">${c.name}</span>`;
        d.onclick = () => openCat(idx);
        g.appendChild(d);
    });
}

function openCat(idx) {
    const category = data[idx];
    const randomMsg = category.letters[Math.floor(Math.random() * category.letters.length)];
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('t').innerText = category.name;
    typeEffect(randomMsg);
}

function typeEffect(text) {
    let el = document.getElementById('l');
    el.innerHTML = "";
    clearInterval(typingInterval);
    let j = 0;
    typingInterval = setInterval(() => {
        el.innerHTML = text.slice(0, j++) + '<span style="color:var(--sparkle-pink)">♥</span>';
        if (j > text.length) {
            el.innerHTML = text;
            clearInterval(typingInterval);
        }
    }, 30);
}

function closeM() {
    document.getElementById('modal').style.display = 'none';
    clearInterval(typingInterval);
}

setInterval(() => {
    let h = document.createElement('div');
    h.className = 'heart';
    const icons = ['❤','💖','✨','⭐'];
    h.innerHTML = icons[Math.floor(Math.random() * icons.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (Math.random() * 20 + 12) + 'px';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 6000);
}, 450);
</script>
